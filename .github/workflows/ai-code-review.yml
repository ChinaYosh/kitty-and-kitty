name: Gemini代码审查
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装稳定版Gemini依赖
        run: pip install google-generativeai==0.7.2 PyGithub

      - name: 运行Gemini代码审查（中文结果）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python - <<EOF
          import os
          # 关键：用稳定版包名，不是google.genai！
          import google.generativeai as genai  
          from github import Github
          from github.Auth import Token

          # 配置Gemini API密钥（稳定版支持configure方法）
          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          # 使用100%可用的模型
          model = genai.GenerativeModel("gemini-1.5-flash-latest")

          # GitHub认证（新版方式，无警告）
          auth = Token(os.environ["GITHUB_TOKEN"])
          g = Github(auth=auth)
          repo = g.get_repo(os.environ["GITHUB_REPOSITORY"])

          # 读取Java代码（只审查.java文件）
          changed_files = []
          if os.environ["GITHUB_PR_NUMBER"] and os.environ["GITHUB_PR_NUMBER"].strip():
              pr = repo.get_pull(int(os.environ["GITHUB_PR_NUMBER"]))
              for file in pr.get_files():
                  changed_files.append(f"文件：{file.filename}\n代码变更：{file.patch}")
          else:
              import glob
              java_files = glob.glob("**/*.java", recursive=True)
              for file in java_files:
                  try:
                      with open(file, "r", encoding="utf-8") as f:
                          content = f.read()
                          changed_files.append(f"文件：{file}\n完整代码：{content}")
                  except Exception as e:
                      changed_files.append(f"文件：{file}\n读取失败：{str(e)}")

          # 给Gemini的审查指令（明确、简洁）
          prompt = """
          你是资深Java后端工程师，仅审查以下内容：
          1. 代码规范：命名（驼峰/下划线）、注释完整性、代码格式
          2. 安全漏洞：空指针、SQL注入、权限校验缺失
          3. 性能优化：循环/缓存/数据库查询建议
          4. 逻辑错误：条件判断/返回值/资源释放问题
          要求：每个问题配修复示例，中文分点回答，无多余内容。
          
          待审查代码：
          {}
          """.format("\n\n".join(changed_files))

          # 调用Gemini生成结果（容错处理）
          try:
              response = model.generate_content(prompt)
              review_result = response.text if response.text else "未检测到代码问题"
          except Exception as e:
              review_result = f"审查失败：{str(e)}"

          # 输出结果到GitHub（PR评论/日志）
          if os.environ["GITHUB_PR_NUMBER"] and os.environ["GITHUB_PR_NUMBER"].strip():
              pr.create_issue_comment(f"### 🤖 Gemini代码审查结果\n{review_result}")
          else:
              print("### 🤖 Gemini代码审查结果\n", review_result)
          EOF
